# ---------------------------------------------------------------------------
# Atlas — Media Management Dashboard
# Web UI: http://<host>:9898
# ---------------------------------------------------------------------------
services:
  atlas:
    build: .
    container_name: Atlas
    restart: unless-stopped
    environment:
      - PUID=1026
      - PGID=100
      - TZ=Europe/Amsterdam
      - NODE_ENV=production
      - PORT=9898
      - CORS_ORIGIN=http://localhost:9898
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
    volumes:
      - '/path/to/atlas/config:/app/server/data'
      - '/path/to/movies:/data/movies'
      - '/path/to/tvshows:/data/tvshows'
      - '/path/to/downloads:/data/downloads'
    ports:
      - '9898:9898'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9898"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
