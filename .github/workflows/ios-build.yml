name: iOS Build

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI
  push:
    branches: [ "main" ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'client/package-lock.json'

    - name: Install Dependencies
      working-directory: ./client
      run: npm ci

    - name: Build Web App
      working-directory: ./client
      run: npm run build

    - name: Sync Capacitor (iOS)
      working-directory: ./client
      run: npx cap sync ios

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Build iOS App (Archive)
      working-directory: ./client/ios/App
      run: |
        # Build an unsigned xcarchive so it can be downloaded and signed locally, 
        # or pushed to a device if developer certificate handling is added.
        xcodebuild -project App.xcodeproj \
                   -scheme App \
                   -sdk iphoneos \
                   -configuration Release \
                   archive -archivePath $PWD/build/App.xcarchive \
                   CODE_SIGN_IDENTITY="" \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGNING_ALLOWED=NO

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: iOS-App-Archive
        path: client/ios/App/build/App.xcarchive
